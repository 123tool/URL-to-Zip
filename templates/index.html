<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPY-E | Web Cloner Pro</title>
    <style>
        :root { --primary: #ffeb3b; --secondary: #000; --bg: #ffffff; }
        body { 
            background-color: var(--bg); font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .container {
            background: white; border: 4px solid var(--secondary);
            box-shadow: 12px 12px 0px var(--secondary);
            padding: 40px; width: 100%; max-width: 500px;
        }
        h1 { font-weight: 900; text-transform: uppercase; margin-bottom: 5px; }
        .badge { background: var(--primary); padding: 5px 10px; border: 2px solid var(--secondary); font-weight: bold; }
        input[type="text"] {
            width: 100%; padding: 15px; margin-top: 25px;
            border: 3px solid var(--secondary); box-sizing: border-box;
            font-size: 16px; font-weight: bold; outline: none;
        }
        button {
            width: 100%; padding: 15px; margin-top: 20px;
            background: var(--secondary); color: white;
            font-size: 18px; font-weight: 900; cursor: pointer;
            border: none; transition: 0.2s;
        }
        button:hover { background: #333; transform: scale(1.02); }
        .footer { margin-top: 30px; font-size: 12px; color: #666; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WEB CLONER <span class="badge">PRO</span></h1>
        <p>Dapatkan source code website instan (All-in-One ZIP).</p>
        
        <form method="POST">
            <input type="text" name="url" placeholder="https://target-site.com" required>
            <button type="submit">GAS CLONING SEKARANG</button>
        </form>

        <div class="footer">Created by SPY-E Tools &copy; 2026</div>
    </div>
</body>
</html>
